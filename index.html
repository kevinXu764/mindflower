<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心花 · 欢迎来到你的心境花园</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #F5F3ED;
      font-family: "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      color: #4A4A4A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 0.9s ease-out;
    }

    .logo {
      width: 96px;
      height: 96px;
      margin: 0 auto 32px;
      background: linear-gradient(135deg, #A8C5E8 0%, #C6A8E6 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 40px rgba(168, 197, 232, 0.35);
    }

    .logo svg {
      width: 58px;
      height: 58px;
    }

    h1 {
      font-size: 42px;
      font-weight: 700;
      color: #3D3D3D;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 18px;
      color: #7A7A7A;
      margin-bottom: 48px;
      line-height: 1.7;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
      text-align: left;
    }

    .card {
      background: #FFFBF5;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.04);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.08);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 14px;
      background: #F0F4E8;
    }

    .card h3 {
      font-size: 16px;
      font-weight: 600;
      color: #3D3D3D;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: #3D3D3D;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 8px 24px rgba(61,61,61,0.2);
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(61,61,61,0.28);
    }

    .footer {
      margin-top: 48px;
      font-size: 13px;
      color: #AAA;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <g style="fill:#ffffff">
          <ellipse cx="12" cy="5.2" rx="2.2" ry="3.9"/>
          <ellipse cx="12" cy="5.2" rx="2.2" ry="3.9" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="5.2" rx="2.2" ry="3.9" transform="rotate(120 12 12)"/>
          <ellipse cx="12" cy="5.2" rx="2.2" ry="3.9" transform="rotate(180 12 12)"/>
          <ellipse cx="12" cy="5.2" rx="2.2" ry="3.9" transform="rotate(240 12 12)"/>
          <ellipse cx="12" cy="5.2" rx="2.2" ry="3.9" transform="rotate(300 12 12)"/>
        </g>
        <circle cx="12" cy="12" r="3" style="fill:#ffdf5e"/>
      </svg>
    </div>
    <h1>心花</h1>
    <p class="tagline">
      每一天的情绪，都是一粒种子。<br>
      记录它、照料它，让心灵在时间里开出属于自己的花园。
    </p>

    <div class="cards">
      <div class="card">
        <div class="card-icon">🌸</div>
        <h3>记录情绪</h3>
        <p>为每一天的情绪打分，好心情会化作花朵，在日历上悄然绽放。</p>
      </div>
      <div class="card">
        <div class="card-icon">🌱</div>
        <h3>种下期待</h3>
        <p>给未来安排一件值得期待的小事，它将以嫩芽的形式陪你成长。</p>
      </div>
      <div class="card">
        <div class="card-icon">📊</div>
        <h3>情绪周报</h3>
        <p>回顾过去一周的心境变化，用可视化的方式更了解自己。</p>
      </div>
    </div>

    <a href="calendar.html" class="cta">
      进入我的花园
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>

    <p class="footer">情绪花园 · 用温柔的方式照顾自己</p>
  </div>
</body>
</html>
